name: Firebase Hosting Preview

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build Astro site inside devcontainer
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca
        with:
          push: never
          runCmd: |
            node --version
            npm --version
            firebase --version
            npm ci
            npm run check

      - name: Deploy to Firebase Hosting preview channel
        if: >-
          github.event_name == 'pull_request' &&
          github.event.pull_request.head.repo.full_name == github.repository &&
          github.actor != 'dependabot[bot]'
        uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_NIKOLAOS_TOLIS_SITE }}"
          projectId: nikolaos-tolis-site
          expires: 7d
          firebaseToolsVersion: "15.19.0"

      - name: Skip Firebase preview deploy
        if: >-
          github.event_name != 'pull_request' ||
          github.event.pull_request.head.repo.full_name != github.repository ||
          github.actor == 'dependabot[bot]'
        run: |
          echo "Skipping Firebase preview deploy."
          echo "Reason:"
          echo "- workflow_dispatch runs do not create PR previews"
          echo "- forked PRs cannot access repository secrets"
          echo "- Dependabot PRs cannot access normal Actions secrets"
          echo
          echo "The Astro build completed successfully."
