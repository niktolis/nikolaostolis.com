name: Firebase Hosting Preview

on:
  pull_request:
    branches:
      - main
  pull_request_target:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build
    if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build Astro site inside devcontainer
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca
        with:
          runCmd: |
            node --version
            npm --version
            firebase --version
            npm ci
            npm run build

      - name: Upload build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: build-artifact
          path: dist

      - name: Deploy to Firebase Hosting preview channel
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
        uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_NIKOLAOS_TOLIS_SITE }}"
          projectId: nikolaos-tolis-site
          expires: 7d
          firebaseToolsVersion: "15.19.0"

      - name: Skip preview deploy in pull_request workflow
        if: github.event_name == 'pull_request' && (github.actor == 'dependabot[bot]' || github.event.pull_request.head.repo.full_name != github.repository)
        run: |
          echo "Skipping Firebase preview deploy in pull_request workflow."
          echo "Forked PRs do not receive repository secrets; Dependabot preview deploys are handled by the pull_request_target job."

      - name: Deploy to Firebase Hosting preview channel
        if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' && github.event.pull_request.head.repo.full_name == github.repository
        uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_NIKOLAOS_TOLIS_SITE }}"
          projectId: nikolaos-tolis-site
          expires: 7d
          firebaseToolsVersion: "15.19.0"

      - name: Skip preview deploy in pull_request workflow
        if: github.event_name == 'pull_request' && (github.actor == 'dependabot[bot]' || github.event.pull_request.head.repo.full_name != github.repository)
        run: |
          echo "Skipping Firebase preview deploy in pull_request workflow."
          echo "Forked PRs do not receive repository secrets; Dependabot preview deploys are handled by the pull_request_target job."
  deploy_preview_dependabot:
    name: deploy preview for dependabot
    if: github.event_name == 'pull_request_target' &&
      github.actor == 'dependabot[bot]' &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      secrets.FIREBASE_SERVICE_ACCOUNT_NIKOLAOS_TOLIS_SITE != ''
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: write

    steps:
      - name: Find successful pull_request build run
        id: find_build_run
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const workflow_id = context.workflow;
            const prNumber = context.payload.pull_request.number;
            const headSha = context.payload.pull_request.head.sha;
            let runId;

            for (let attempt = 0; attempt < 18; attempt++) {
              const { data } = await github.rest.actions.listWorkflowRuns({
                owner,
                repo,
                workflow_id,
                event: "pull_request",
                per_page: 50,
              });

              const matchingRun = data.workflow_runs.find((run) =>
                run.head_sha === headSha &&
                run.pull_requests.some((pr) => pr.number === prNumber) &&
                run.status === "completed" &&
                run.conclusion === "success"
              );

              if (matchingRun) {
                runId = matchingRun.id;
                break;
              }

              await new Promise((resolve) => setTimeout(resolve, 10000));
            }

            if (!runId) {
              core.setFailed("Could not find a successful pull_request build run for this Dependabot PR.");
              return;
            }

            core.setOutput("run_id", String(runId));

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-artifact
          run-id: ${{ steps.find_build_run.outputs.run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: dist

      - name: Deploy to Firebase Hosting preview channel
        uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_NIKOLAOS_TOLIS_SITE }}"
          projectId: nikolaos-tolis-site
          expires: 7d
          firebaseToolsVersion: "15.19.0"

  skip_preview_deploy:
    name: skip preview deploy
    if: github.event_name == 'pull_request_target' &&
      (github.actor != 'dependabot[bot]' ||
      github.event.pull_request.head.repo.full_name != github.repository ||
      secrets.FIREBASE_SERVICE_ACCOUNT_NIKOLAOS_TOLIS_SITE == '')
    permissions: {}
    runs-on: ubuntu-latest

    steps:
      - name: Explain why preview deploy was skipped
        run: |
          echo "Skipping Firebase preview deploy."
          echo "Preview deploys in this workflow are only enabled for same-repository Dependabot pull requests with the Firebase secret available."
