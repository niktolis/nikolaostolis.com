name: Firebase Hosting Preview

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  checks: write
  contents: read
  pull-requests: write

jobs:
  build:
    name: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Build Astro site inside devcontainer
        uses: devcontainers/ci@513af61f4de4f75d37e4438f184ba4358f0fc1ca
        with:
          runCmd: |
            node --version
            npm --version
            firebase --version
            npm ci
            npm run build

      - name: Deploy to Firebase Hosting preview channel
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
        uses: FirebaseExtended/action-hosting-deploy@e2eda2e106cfa35cdbcf4ac9ddaf6c4756df2c8c
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT_NIKOLAOS_TOLIS_SITE }}"
          projectId: nikolaos-tolis-site
          expires: 7d
          firebaseToolsVersion: "15.19.0"

      - name: Skip preview deploy for forked PR
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        run: |
          echo "Skipping Firebase preview deploy because this PR comes from a fork."
          echo "Build completed successfully, but repository secrets are unavailable to forked PRs."
